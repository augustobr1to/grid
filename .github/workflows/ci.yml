name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs for the same ref (PR or branch).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Disable Nx Cloud / interactive prompts in CI.
  NX_CLOUD_ACCESS_TOKEN: ""
  NX_DAEMON: "false"

jobs:
  ci:
    name: Lint / Test / Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # nx affected needs full history to diff against the base branch.
          fetch-depth: 0

      - name: Enable Corepack (pins pnpm from package.json packageManager)
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Cache Nx
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            nx-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Sets NX_BASE / NX_HEAD so `nx affected` knows what changed on PRs.
      - name: Derive Nx SHAs
        uses: nrwl/nx-set-shas@v4

      - name: Lint, test, build (affected on PRs)
        if: github.event_name == 'pull_request'
        run: pnpm exec nx affected -t lint test build --base=$NX_BASE --head=$NX_HEAD

      - name: Lint, test, build (full on main)
        if: github.event_name != 'pull_request'
        run: pnpm exec nx run-many -t lint test build --all

      # size-limit reads packages/engine/dist/index.mjs, produced by the build above.
      - name: Size limit
        run: pnpm size
